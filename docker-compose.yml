services:
  postgres:
    image: postgres:16-alpine
    container_name: daka-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: daka
      POSTGRES_PASSWORD: daka
      POSTGRES_DB: daka_hlas
    ports:
      - "5432:5432"
    volumes:
      - daka-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daka -d daka_hlas"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: daka-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - daka-redis:/data

  minio:
    image: minio/minio:latest
    container_name: daka-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: daka
      MINIO_ROOT_PASSWORD: daka-secret
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # konzola
    volumes:
      - daka-minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Vytvorí bucket pri štarte
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (mc alias set local http://minio:9000 daka daka-secret) do echo 'cakam na minio...'; sleep 2; done;
      mc mb --ignore-existing local/daka-hlas;
      echo 'bucket pripraveny';
      "

volumes:
  daka-postgres:
  daka-redis:
  daka-minio:
