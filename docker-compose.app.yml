# Celá aplikácia DAKA Hlas na jeden príkaz:
#   docker compose -f docker-compose.app.yml up --build
# Potom otvor http://localhost:3000  (admin@ckdaka.sk / admin123)
#
# Voliteľné: pre reálny AI prepis/zhrnutia nastav pred spustením OPENAI_API_KEY,
# napr.:  OPENAI_API_KEY=sk-... docker compose -f docker-compose.app.yml up --build
# Bez kľúča appka beží a obsahuje ukážkovú nahrávku s prepisom a zhrnutím (demo).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: daka
      POSTGRES_PASSWORD: daka
      POSTGRES_DB: daka_hlas
    volumes:
      - daka-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daka -d daka_hlas"]
      interval: 5s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: daka
      MINIO_ROOT_PASSWORD: daka-secret
    volumes:
      - daka-minio:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (mc alias set local http://minio:9000 daka daka-secret) do echo 'cakam na minio...'; sleep 2; done;
      mc mb --ignore-existing local/daka-hlas;
      echo 'bucket pripraveny';
      "

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://daka:daka@postgres:5432/daka_hlas?schema=public
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: eu-central-1
      S3_BUCKET: daka-hlas
      S3_ACCESS_KEY: daka
      S3_SECRET_KEY: daka-secret
      S3_FORCE_PATH_STYLE: "true"
      JWT_SECRET: zmen-ma-v-produkcii
      JWT_REFRESH_SECRET: zmen-ma-tiez-v-produkcii
      JWT_ACCESS_TTL: "3600"
      JWT_REFRESH_TTL: "2592000"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_TRANSCRIBE_MODEL: whisper-1
      OPENAI_SUMMARY_MODEL: gpt-4o
      AI_DEFAULT_LANGUAGE: sk
      CRM_WEBHOOK_URL: ${CRM_WEBHOOK_URL:-}
      API_PORT: "4000"
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  daka-postgres:
  daka-minio:
