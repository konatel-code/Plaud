name: Demo na GitHub Pages

on:
  push:
    branches:
      - claude/serene-planck-7Yv91
      - main
    paths:
      - "apps/web/**"
      - "packages/shared/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build demo (statický export)
        run: |
          pnpm --filter @daka/shared build
          pnpm --filter @daka/web build
        env:
          NEXT_PUBLIC_DEMO: "1"
          PAGES_BASE_PATH: "/Plaud"

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
